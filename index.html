*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {

.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:500; align-items:center; justify-content:center; }

.modal iframe { width:100%; height:340px; border:none; display:block; }

.no-results { grid-column:1/-1; text-align:center; padding:4rem 1rem; color:var(--mid); font-size:.9rem; }

/* SIDEBAR */
.sidebar { display:flex; flex-direction:column; gap:1.5rem; }
.side-box { background:var(--white); border:1px solid var(--border); overflow:hidden; }
.side-box-title { background:var(--dark); color:var(--white); font-size:.75rem; font-weight:700; letter-spacing:.12em; padding:.6rem 1rem; }

/* Featured card in sidebar */
.featured-card { position:relative; height:160px; overflow:hidden; cursor:pointer; margin-bottom:1rem; }
.featured-card img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }

.featured-card-text .cat-tag { margin-bottom:.3rem; display:inline-block; }

.popular-list { list-style:none; display:flex; flex-direction:column; }

.popular-num { font-family:'Noto Serif JP',serif; font-size:1.2rem; font-weight:700; color:var(--border); line-height:1; flex-shrink:0; width:18px; text-align:center; margin-top:2px; }

.popular-cat { font-size:.62rem; color:var(--mid); margin-top:.1rem; }

.access-list { list-style:none; display:flex; flex-direction:column; gap:.8rem; }

.access-item strong { color:var(--dark); display:block; font-size:.72rem; }
.side-map iframe { width:100%; height:200px; border:none; display:block; }

/* FOOTER */
footer { background:var(--dark); color:rgba(255,255,255,.45); text-align:center; padding:3rem 1.5rem; font-size:.73rem; letter-spacing:.1em; margin-top:2rem; }

</style>
</head>

        <ul class="access-list">
          <li class="access-item"><strong>東武東上線</strong>池袋駅から急行で約30分 → 川越駅</li>
          <li class="access-item"><strong>西武新宿線</strong>西武新宿駅から約49分 → 本川越駅</li>
          <li class="access-item"><strong>JR川越線</strong>大宮駅から約23分 → 川越駅</li>
          <li class="access-item"><strong>お車</strong>関越道 川越ICより約15分</li>
        </ul>
      </div>
    </div>
    <!-- Map -->
    <div class="side-box">
      <div class="side-box-title">川越エリア地図</div>
      <div class="side-map">
        <iframe src="https://maps.google.com/maps?q=川越市+蔵造り+一番街&output=embed&hl=ja&z=15" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </aside>
</div>

<!-- MAP MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <iframe id="modal-iframe" src="" allowfullscreen loading="lazy"></iframe>
  </div>
</div>

<footer>
  <div class="footer-logo" id="footer-logo"></div>
  <div class="footer-sub" id="footer-sub"></div>
  <p>© 2025 川越マップ</p>
  <p class="footer-note">写真提供: Unsplash — 実際の写真に差し替えることをおすすめします</p>
</footer>

<script>
const state = { cat:"全て", tag:null };

// Static text
document.getElementById('logo-main').textContent = SITE.name;
document.getElementById('logo-sub').textContent = SITE.tagline;
document.getElementById('hero-h1').textContent = SITE.name;
document.getElementById('hero-p').textContent = SITE.desc;
document.getElementById('footer-logo').textContent = SITE.name;
document.getElementById('footer-sub').textContent = SITE.tagline;
document.getElementById('hero-bg').style.backgroundImage = 'url(' + SITE.hero_img + ')';

// Category nav
const cats = ["全て","観光","グルメ","イベント"];
const catNav = document.getElementById('cat-nav');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (c==="全て"?' active':'');
  btn.textContent = c; btn.dataset.cat = c;
  btn.addEventListener('click', () => {
    state.cat = c; state.tag = null;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===c));
    document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
    render();
  });
  catNav.appendChild(btn);
});

// Tags
const allTags = [...new Set(ARTICLES.flatMap(a => a.tags))];
const tagBar = document.getElementById('tag-bar-pills');
allTags.forEach(t => {
  const pill = document.createElement('button');
  pill.className = 'tag-pill'; pill.textContent = t; pill.dataset.tag = t;
  pill.addEventListener('click', () => {
    if (state.tag===t) { state.tag=null; pill.classList.remove('active'); }
    else {
      state.tag = t;
      document.querySelectorAll('.tag-pill').forEach(p => p.classList.toggle('active', p.dataset.tag===t));
      state.cat = "全て";
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat==="全て"));
    }
    render();
  });
  tagBar.appendChild(pill);
});

// Render cards
function filtered() {
  return ARTICLES.filter(a => {
    const catOk = state.cat==="全て" || a.category===state.cat;
    const tagOk = !state.tag || a.tags.includes(state.tag);
    return catOk && tagOk;
  });
}

function render() {
  const list = filtered();
  const grid = document.getElementById('cards-grid');
  document.getElementById('section-title').textContent = state.tag ? '#'+state.tag : state.cat==="全て" ? "すべての記事" : state.cat;
  document.getElementById('count-badge').textContent = list.length + '件';

  if (!list.length) {
    grid.innerHTML = '<div class="no-results">該当する記事が見つかりませんでした</div>';
    return;
  }
  grid.innerHTML = list.map(a => `
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="${a.img}" alt="${a.title}" loading="lazy">
        <div class="card-img-overlay"></div>
        <div class="card-img-cat"><span class="cat-tag ${a.category}">${a.category}</span></div>
      </div>
      <div class="card-body">
        <div class="card-meta"><span class="card-date">${a.date}</span></div>
        <div class="card-title">${a.title}</div>
        <div class="card-sub">${a.sub}</div>
        <p class="card-desc">${a.desc}</p>
        <div class="card-tags">${a.tags.map(t=>'<span class="card-tag">#'+t+'</span>').join('')}</div>
        <button class="card-map-btn" onclick="openModal('${a.title}','${a.map}')">地図を見る</button>
      </div>
    </div>`).join('');
}

// Sidebar featured (first 2 articles)
const featuredWrap = document.getElementById('featured-wrap');
[ARTICLES[0], ARTICLES[10]].forEach(a => {
  featuredWrap.innerHTML += `
    <div class="featured-card" onclick="filterCat('${a.category}')">
      <img src="${a.img}" alt="${a.title}" loading="lazy">
      <div class="featured-card-overlay"></div>
      <div class="featured-card-text">
        <span class="cat-tag ${a.category}">${a.category}</span>
        <div class="featured-card-title">${a.title}</div>
      </div>
    </div>`;
});

// Popular list
const popularIds = [11,1,7,2,4];
const popList = document.getElementById('popular-list');
popularIds.forEach((id,i) => {
  const a = ARTICLES.find(x => x.id===id);
  if (!a) return;
  const li = document.createElement('li');
  li.className = 'popular-item';
  li.innerHTML = `
    <div class="popular-num ${i<3?'top3':''}">${i+1}</div>
    <img class="popular-thumb" src="${a.img}" alt="${a.title}" loading="lazy">
    <div>
      <div class="popular-title">${a.title}</div>
      <div class="popular-cat">${a.category} / ${a.tags[0]}</div>
    </div>`;
  li.addEventListener('click', () => { filterCat(a.category); });
  popList.appendChild(li);
});

function filterCat(cat) {
  state.cat = cat; state.tag = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Modal
function openModal(title, mapUrl) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-iframe').src = mapUrl;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('modal-iframe').src = '';
  }
}

render();
</script>
</body>
</html>
